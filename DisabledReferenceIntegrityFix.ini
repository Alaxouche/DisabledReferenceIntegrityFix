# ========================================================
# Z-Floor Patcher Configuration
# ========================================================
# Place this file in: Data/SKSE/Plugins/DisabledReferenceIntegrityFix.ini
#
# Purpose: Fix micro-stutter caused by references and navmeshes
#          with Z coordinates below -30,000 (worldspace boundary)
#
# Performance: ~800 navmeshes typically found below -30K in
#              modded load orders causing continuous stutter
# ========================================================

# ============ LOGGING SETTINGS ============
# Enable or disable logging to file
enable_logging = true

# Verbose mode: logs every single reference checked (can be slow)
# Keep false unless debugging specific issues
verbose_logging = false

# Log level: 1=error, 2=warn, 3=info, 4=debug, 5=trace
# Recommended: 3 for normal use, 4 for troubleshooting
log_level = 3


# ============ FIX SETTINGS ============
# Fix references (placed objects, NPCs, statics, etc.)
fix_references = true

# Fix navmesh vertices below -30K
fix_navmeshes = true

# Early reference hooks:
#   1) InitItemImpl pre-normalization when refs are still pre-live
#   2) Load3D gate before mesh/texture/havok load
# This is the main anti-stutter / anti-crash path.
early_fix_on_load3d = true

# Runtime correction pass on every fully-loaded cell event.
# Fires via Papyrus VM — AFTER meshes are already loaded, so it cannot prevent
# the initial 3D load cost. Its role is correctness: applying Disable(),
# enable-parent attachment, etc. to refs in newly entered cells.
# If false, reference fallback is disabled; however navmesh event correction still
# runs when fix_navmeshes=true.
auto_fix_on_cell_load = true


# ============ CELL TYPE FILTERS ============
# Patch interior cells (dungeons, houses, etc.)
patch_interior = true

# Patch exterior cells (worldspace)
patch_exterior = true


# ============ REFERENCE FILTERS ============
# Include deleted references in scan
# These will be recovered: cleared Deleted flag, set InitiallyDisabled,
# moved to -30K, and attached to PlayerRef with opposite enable state
include_deleted_refs = false

# Exclude refs by source plugin name (repeatable key)
# Matching is case-insensitive.
# You can chain values on one line with commas or dashes.
# Examples:
# excludemod = SomeMod.esp
# excludemod = AnotherMod.esm
# excludemod = SomeMod.esp, AnotherMod.esm, LegacyoftheDragonborn.esm
# excludemod = SomeMod.esp - AnotherMod.esm - LegacyoftheDragonborn.esm
excludemod = Lux.esp
excludemod = LegacyoftheDragonborn.esm

# Exclude refs by FormID (repeatable key, hex or decimal)
# You can chain values on one line with commas or dashes.
# Examples:
# excludeform = 0x00123456
# excludeform = 1193046
# excludeform = 0x00123456, 0x000C42F3, 0x000DD211
# excludeform = 0x00123456 - 0x000C42F3 - 0x000DD211

# Per-reference correction logs (when enabled):
#
# Format: [TAG] ref=0x... base=0x... "name" Z:old->new action=... 
#         cell=0x... cellType=int/ext cellXY=(x,y) srcRef=... srcBase=...
#
# Tags:
#   [DELETED]     = Recovered deleted reference
#   [INIT-DISBL]  = Applied InitiallyDisabled correction rule
#   [BELOW-30K]   = Gated reference below -30K + disabled
#   [NAVMESH]     = Navmesh vertices Z-clamped for cell
#   [cell]        = Cell-level fix summary
#   [hooks]       = Hook instrumentation telemetry

# ============ PERFORMANCE LIMITS ============
# Maximum references to fix per cell (0 = unlimited)
# Use to prevent long loading times if many refs need fixing
# Recommended: 0 for complete fix, or 100-500 for gradual fixing
max_refs_per_batch = 0